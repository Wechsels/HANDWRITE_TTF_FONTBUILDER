appId: com.wechsels.handwrite-fontbuilder
productName: 手写字库构建工具
copyright: Copyright © 2024 Wechsels
directories:
  output: dist
  buildResources: icon
files:
  - out/**/*
  - "!node_modules"
extraResources:
  - from: backend
    to: backend
  - from: data/default_charset.txt
    to: data/default_charset.txt
win:
  icon: icon/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 手写字库构建工具
portable:
  artifactName: ${productName}-portable-${version}.${ext}
